<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Admission Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏥 Hospital Patient Admission Form</h1>
            <p>Please fill in all required fields</p>
        </div>

        <form id="admissionForm">
            <!-- Personal Information -->
            <fieldset>
                <legend>Personal Information</legend>

                <div class="form-group">
                    <label for="patientId">Patient ID:</label>
                    <input type="text" id="patientId" name="patientId" required>
                    <span class="error" id="patientIdError"></span>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">First Name:</label>
                        <input type="text" id="firstName" name="firstName" required>
                        <span class="error" id="firstNameError"></span>
                    </div>

                    <div class="form-group">
                        <label for="lastName">Last Name:</label>
                        <input type="text" id="lastName" name="lastName" required>
                        <span class="error" id="lastNameError"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="dob">Date of Birth:</label>
                        <input type="date" id="dob" name="dob" required>
                        <span class="error" id="dobError"></span>
                    </div>

                    <div class="form-group">
                        <label for="gender">Gender:</label>
                        <select id="gender" name="gender" required>
                            <option value="">Select Gender</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                        <span class="error" id="genderError"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="phone">Contact Number:</label>
                        <input type="tel" id="phone" name="phone" required>
                        <span class="error" id="phoneError"></span>
                    </div>

                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required>
                        <span class="error" id="emailError"></span>
                    </div>
                </div>
            </fieldset>

            <!-- Address Information -->
            <fieldset>
                <legend>Address Information</legend>

                <div class="form-group">
                    <label for="address">Address:</label>
                    <textarea id="address" name="address" rows="3" required></textarea>
                    <span class="error" id="addressError"></span>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="city">City:</label>
                        <input type="text" id="city" name="city" required>
                        <span class="error" id="cityError"></span>
                    </div>

                    <div class="form-group">
                        <label for="state">State:</label>
                        <input type="text" id="state" name="state" required>
                        <span class="error" id="stateError"></span>
                    </div>

                    <div class="form-group">
                        <label for="zip">PIN Code:</label>
                        <input type="text" id="zip" name="zip" required>
                        <span class="error" id="zipError"></span>
                    </div>
                </div>
            </fieldset>

            <!-- Medical Information -->
            <fieldset>
                <legend>Medical Information</legend>

                <div class="form-row">
                    <div class="form-group">
                        <label for="bloodGroup">Blood Group:</label>
                        <select id="bloodGroup" name="bloodGroup" required>
                            <option value="">Select Blood Group</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                        </select>
                        <span class="error" id="bloodGroupError"></span>
                    </div>

                    <div class="form-group">
                        <label for="admissionDate">Date of Admission:</label>
                        <input type="date" id="admissionDate" name="admissionDate" required>
                        <span class="error" id="admissionDateError"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="diagnosis">Diagnosis:</label>
                    <textarea id="diagnosis" name="diagnosis" rows="4" required></textarea>
                    <span class="error" id="diagnosisError"></span>
                </div>

                <div class="form-group">
                    <label for="allergies">Allergies (if any):</label>
                    <textarea id="allergies" name="allergies" rows="3"></textarea>
                </div>

                <div class="form-group">
                    <label for="medication">Current Medications:</label>
                    <textarea id="medication" name="medication" rows="3"></textarea>
                </div>
            </fieldset>

            <!-- Emergency Contact -->
            <fieldset>
                <legend>Emergency Contact</legend>

                <div class="form-row">
                    <div class="form-group">
                        <label for="emergencyName">Name:</label>
                        <input type="text" id="emergencyName" name="emergencyName" required>
                        <span class="error" id="emergencyNameError"></span>
                    </div>

                    <div class="form-group">
                        <label for="emergencyPhone">Phone:</label>
                        <input type="tel" id="emergencyPhone" name="emergencyPhone" required>
                        <span class="error" id="emergencyPhoneError"></span>
                    </div>

                    <div class="form-group">
                        <label for="relationship">Relationship:</label>
                        <input type="text" id="relationship" name="relationship" required>
                        <span class="error" id="relationshipError"></span>
                    </div>
                </div>
            </fieldset>

            <div class="form-buttons">
                <button type="submit" class="btn btn-submit">Submit</button>
                <button type="reset" class="btn btn-reset">Reset</button>
            </div>
        </form>

        <div id="successMessage" class="success-message" style="display: none;">
            ✓ Admission form submitted successfully!
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
